spring:
  application:
    name: inventory-service

  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:h2:mem:stockflowdb
    username: sa
    password:

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console



resilience4j:
  ratelimiter:
    instances:
      movementHistoryLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0

  retry:
    instances:
      movementRetry:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

  circuitbreaker:
    instances:
      alertsService:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        minimumNumberOfCalls: 5
        automaticTransitionFromOpenToHalfOpenEnabled: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG

info:
  app:
    name: inventory-service
    description: Inventory Service for StockFlow monitoring
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, info

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: http://localhost:4200

