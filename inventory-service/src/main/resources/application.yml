spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:h2:mem:stockflowdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

    hikari:
      # Escenario de carga media:
      # permite hasta 10 conexiones concurrentes a la BD
      maximum-pool-size: 10

      # mantiene 5 conexiones listas para reducir latencia
      minimum-idle: 5

      # espera máxima de 30 segundos para obtener una conexión
      connection-timeout: 30000

      # libera conexiones inactivas después de 10 minutos
      idle-timeout: 600000

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

    hibernate:
      ddl-auto: create-drop

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG