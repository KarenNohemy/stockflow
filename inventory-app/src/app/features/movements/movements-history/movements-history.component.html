
<div class="card mt-4">


  <div class="card-header">
    <strong>Movement History</strong>
  </div>

  <div class="card-body">

    <div *ngIf="loading()" class="text-center">
      Loading history...
    </div>

    <div *ngIf="error()" class="alert alert-danger">
      {{ error() }}
    </div>

    <table
      *ngIf="!loading() && !error()"
      class="table table-striped">

      <thead>
      <tr>
        <th>ID</th>
        <th>Type</th>
        <th>Quantity</th>
        <th>Reason</th>
        <th>Date</th>
      </tr>
      </thead>

      <tbody>

      <tr *ngFor="let m of movements()">

        <td>{{ m.id }}</td>

        <td>
          <span
            class="badge"
            [class.bg-success]="m.type === 'IN'"
            [class.bg-danger]="m.type === 'OUT'">

            {{ m.type }}

          </span>
        </td>

        <td>{{ m.quantity }}</td>
        <td>{{ m.reason }}</td>
        <td>{{ m.timestamp | date:'short' }}</td>

      </tr>

      </tbody>

    </table>

  </div>

</div>
